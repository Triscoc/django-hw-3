{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Findings: </h2>

<div class="row">
  {% for item in items %}
  <div class="col-md-4 mb-3">
    <div class="card h-100 shadow-sm">
      <div class="card-body">
        <h5 class="card-title text-primary">{{ item.name }}</h5>
        <h6 class="card-subtitle mb-2 text-muted">📍 {{ item.location }}</h6>
        <p class="card-text">{{ item.description }}</p>
        <p class="text-muted small">Logged: {{ item.found_date|date:"Y-m-d H:i" }}</p>
        <a href="{% url 'claim_item' item.id %}" class="btn btn-success btn-sm">Mark as Returned</a>
      </div>
    </div>
  </div>
  {% empty %}
  <div class="alert alert-info">No items!</div>
  {% endfor %}
</div>
{% endblock %}
