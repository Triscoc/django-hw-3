<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Campus Lost And Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">
      <a class="navbar-brand" href="{% url 'board' %}">Campus Lost And Found</a>

      <div class="navbar-nav ms-auto d-flex flex-row gap-3 align-items-center">
        {% if user.is_authenticated %}
            <span class="navbar-text text-light me-3">Welcome, {{ user.username }}!</span>
            <a class="nav-link" href="{% url 'board' %}">Dashboard</a>
            <a class="nav-link" href="{% url 'add_item' %}">Report Found Item</a>
            <a class="nav-link" href="{% url 'history' %}">History Log</a>
            <a class="btn btn-outline-danger btn-sm ms-2" href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a class="nav-link" href="{% url 'login' %}">Login</a>
            <a class="btn btn-primary btn-sm ms-2" href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}
    {% endblock %}
  </div>

</body>
</html>
